<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Green circle background -->
  <circle cx="32" cy="32" r="32" fill="#2E7D32"/>
  <!-- White tooth body -->
  <rect x="16" y="14" width="32" height="28" rx="16" ry="14" fill="white"/>
  <!-- Tooth roots -->
  <ellipse cx="24" cy="40" rx="7" ry="6" fill="white"/>
  <ellipse cx="32" cy="42" rx="7" ry="7" fill="white"/>
  <ellipse cx="40" cy="40" rx="7" ry="6" fill="white"/>
  <!-- Left eye -->
  <ellipse cx="25" cy="26" rx="4" ry="4.5" fill="#1565C0"/>
  <ellipse cx="26" cy="24.5" rx="1.5" ry="1.8" fill="white"/>
  <!-- Right eye -->
  <ellipse cx="39" cy="26" rx="4" ry="4.5" fill="#1565C0"/>
  <ellipse cx="40" cy="24.5" rx="1.5" ry="1.8" fill="white"/>
  <!-- Smile -->
  <path d="M 25 33 Q 32 39 39 33" stroke="#E91E63" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Cheeks -->
  <ellipse cx="19" cy="30" rx="4" ry="2.5" fill="#FFAB91" opacity="0.6"/>
  <ellipse cx="45" cy="30" rx="4" ry="2.5" fill="#FFAB91" opacity="0.6"/>
</svg>